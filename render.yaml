services:
  - type: web
    name: connectxion
    runtime: docker
    plan: free
    envVars:
      - key: MYSQLHOST
        fromDatabase:
          name: connectxion-db
          property: host
      - key: MYSQLUSER
        fromDatabase:
          name: connectxion-db
          property: user
      - key: MYSQLPASSWORD
        fromDatabase:
          name: connectxion-db
          property: password
      - key: MYSQLDATABASE
        fromDatabase:
          name: connectxion-db
          property: database
      - key: MYSQLPORT
        fromDatabase:
          name: connectxion-db
          property: port
      - key: SOCKET_URL
        value: https://your-socket-server.onrender.com

databases:
  - name: connectxion-db
    plan: free
    databaseName: connectxion
    user: connectxion_user
